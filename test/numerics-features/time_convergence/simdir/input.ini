[FUSS-Parameters]
newrun = true
iter-threshold = 500

[FUSS-Numerics]
time-scheme = RK2
vnn = 1.5
time-accurate = false
integration-variables = prim
irs = true
irs-beta = 0.5

[FUSS-IO]
sol-format = tecplot ascii

;

[GRIB-meshgen]
outpath = MESH/
method = fmsh
type = 2Dplane
width = 0.01

[GRIB-Block1]
pivot = 0.0 0.0 0.0
length = 1.0
height = 0.2
nx = 1000
ny = 20
strx = U 1.0
stry = U 1.0

[GRIB-Block2]
pivot = 1.0 0.0 0.0
length = 1.0
height = 0.2
nx = 1000
ny = 20
strx = U 1.0
