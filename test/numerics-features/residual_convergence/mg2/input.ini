[FUSS-Parameters]
newrun = true
res-threshold = 1e-8

[FUSS-Numerics]
time-scheme = RK3
vnn = 0.5
time-accurate = false
integration-variables = prim
irs = false

[FUSS-Multigrid]
levels = 2
level1-iter = 1000000
level2-iter = 50000

[FUSS-IO]
sol-diter     = 10000
sol-overwrite = true
sol-format    = tecplot ascii
ini-diter = 1000

;

[GRIB-meshgen]
outpath = MESH/
method = fmsh
type = 2Dplane
width = 0.01

[GRIB-Block1]
pivot = 0.0 0.0 0.0
length = 0.5
height = 0.1
nx = 100
ny = 10
strx = U 1.0
stry = U 1.0

[GRIB-Block2]
pivot = 0.5 0.0 0.0
length = 0.5
height = 0.1
nx = 100
ny = 10
strx = U 1.0
stry = U 1.0

;

[ATLAS-Parameters]
MG-levels = 2

;

[GPB-Phase1]
type = solid
material = mat1 mat2
cp  = 450.0  450.0
rho = 8000.0 8000.0
k   = 10.0   100.0
Tmax = 3000

;

[ICB-Block1]
type = homogeneous
material = mat1
T = 1500.0

[ICB-Block2]
type = homogeneous
material = mat2
T = 1500.0

;

[BCB-Block1]
face1 = Twall-cold
face2 = connection
face3 = null
face4 = null
face5 = null
face6 = null

[BCB-Block2]
face1 = connection
face2 = Twall-hot
face3 = null
face4 = null
face5 = null
face6 = null

[Twall-hot]
type = wall
T = 2000.0

[Twall-cold]
type = wall
T = 1000.0
