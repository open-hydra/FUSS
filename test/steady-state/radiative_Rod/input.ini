[FUSS-Parameters]
newrun = true
res-threshold = 1e-8

[FUSS-Numerics]
time-scheme = RK3
vnn = 2.0
time-accurate = false
integration-variables = prim
irs = true
irs-beta = 0.5

[FUSS-IO]
sol-diter     = 10000
sol-overwrite = true
sol-format    = tecplot ascii
ini-diter = 1000

;

[GRIB-meshgen]
outpath = MESH/
method = fmsh
type = 2Dplane
width = 0.01

[GRIB-Block1]
pivot = 0.0 0.0 0.0
length = 0.1
height = 0.01
nx = 100
ny = 2
strx = U 1.0
stry = U 1.0

;

[GPB-Phase1]
type = solid
material = mat
cp  = 460.0
rho = 7850.0
k   = 55.563
Tmax = 5000

;

[ICB-Block1]
type = homogeneous
material = mat
T = 1000.0

;

[BCB-Block1]
face1 = Twall
face2 = radiation
face3 = null
face4 = null
face5 = null
face6 = null

[Twall]
type = wall
T = 1000.0

[radiation]
type = wall
eps  = 0.98
Tref = 300.0
