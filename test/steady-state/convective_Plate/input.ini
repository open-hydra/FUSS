[FUSS-Parameters]
newrun = true
res-threshold = 1e-8

[FUSS-Numerics]
time-scheme = RK3
vnn = 2.0
time-accurate = false
integration-variables = prim
irs = true
irs-beta = 0.5

[FUSS-IO]
sol-diter     = 10000
sol-overwrite = true
sol-format    = tecplot ascii
ini-diter = 1000

;

[GRIB-meshgen]
outpath = MESH/
method = fmsh
type = 2Dplane
width = 0.01

[GRIB-Block1]
pivot = 0.0 0.0 0.0
length = 0.6
height = 1.0
nx = 60
ny = 100
strx = U 1.0
stry = U 1.0

;

[GPB-Phase1]
type = solid
material = mat
cp  = 460.0
rho = 7850.0
k   = 52.0
Tmax = 1000

;

[ICB-Block1]
type = homogeneous
material = mat
T = 373.15

;

[BCB-Block1]
face1 = adiabatic
face2 = convection
face3 = Twall
face4 = convection
face5 = null
face6 = null

[adiabatic]
type = wall
q = 0.0

[convection]
type = wall
hconv = 750.0
Tref  = 273.15
qrad  = 0.0

[Twall]
type = wall
T = 373.15
