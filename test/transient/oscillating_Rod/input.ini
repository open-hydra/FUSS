[FUSS-Parameters]
newrun = true
time-threshold = 160.0

[FUSS-Numerics]
time-scheme = RK3
vnn = 0.5
time-accurate = true
integration-variables = prim
irs = false

[FUSS-IO]
sol-dtime     = 10.0
sol-overwrite = true
sol-format    = tecplot ascii
ini-diter = 1000

[FUSS-Probes]
probe1 = p1
probe2 = p2

[p1]
index-position = 1 90 1 1
variables = T
dtime = 0.1

[p2]
index-position = 1 91 1 1
variables = T
dtime = 0.1

;

[GRIB-meshgen]
outpath = MESH/
method = fmsh
type = 2Dplane
width = 0.01

[GRIB-Block1]
pivot = 0.0 0.0 0.0
length = 0.1
height = 0.01
nx = 100
ny = 2
strx = U 1.0
stry = U 1.0

;

[GPB-Phase1]
type = solid
material = mat
cp  = 985.0
rho = 2300.0
k   = 1.0
Tmax = 4000

;

[ICB-Block1]
type = homogeneous
material = mat
T = 2000.0

;

[BCB-Block1]
face1 = Tw_fixed
face2 = Tw_variable
face3 = null
face4 = null
face5 = null
face6 = null

[Tw_fixed]
type = wall
T = 2000.0

[Tw_variable]
type = wall
T-timefile    = Tw_time.dat
