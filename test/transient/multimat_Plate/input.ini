[FUSS-Parameters]
newrun = true
time-threshold = 0.505

[FUSS-Numerics]
time-scheme = RK3
vnn = 0.8
time-accurate = true
integration-variables = prim
irs = false

[FUSS-IO]
sol-diter     = 10
sol-overwrite = false
sol-format    = tecplot ascii

;

[GRIB-meshgen]
outpath = MESH/
method = fmsh
type = 2Dplane
width = 0.01

[GRIB-Block1]
pivot = -1.0 0.0 0.0
length = 0.75
height = 2.0
nx = 15
ny = 40
strx = U 1.0
stry = U 1.0

[GRIB-Block2]
pivot = -0.25 0.0 0.0
length = 0.50
height = 2.0
nx = 10
ny = 40
strx = U 1.0
stry = U 1.0

[GRIB-Block3]
pivot = 0.25 0.0 0.0
length = 0.75
height = 2.0
nx = 15
ny = 40
strx = U 1.0
stry = U 1.0

;

[GPB-Phase1]
type = solid
material = insulation conductive
cp  = 1.0 1.0
rho = 1.0 1.0
k   = 1.e-12 1.0
Tmax = 200

;

[ICB-Block1]
type = homogeneous
material = insulation
T = 100.0

[ICB-Block2]
type = homogeneous
material = conductive
T = 100.0

[ICB-Block3]
type = homogeneous
material = insulation
T = 100.0

;

[BCB-Block1]
face1 = adiabatic
face2 = connection
face3 = Twall-hot
face4 = Twall-cold
face5 = null
face6 = null

[BCB-Block2]
face1 = connection
face2 = connection
face3 = Twall-hot
face4 = Twall-cold
face5 = null
face6 = null

[BCB-Block3]
face1 = connection
face2 = adiabatic
face3 = Twall-hot
face4 = Twall-cold
face5 = null
face6 = null

[adiabatic]
type = wall
q = 0.0

[Twall-cold]
type = wall
T = 100.0

[Twall-hot]
type = wall
T = 101.0
